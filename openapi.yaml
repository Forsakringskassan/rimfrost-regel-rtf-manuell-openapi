openapi: 3.1.0
info:
  title: RTF Manuell API
  version: 1.1.0
  description: API för att hämta all relevant information för att utföra en manuell rätt till försäkring kontroll

servers:
  - url: /regel/rtf-manuell

components:
  schemas:
    GetDataResponse:
      type: object
      properties:
        handlaggning_id:
          type: string
          format: uuid
        kund:
          $ref: "#/components/schemas/Kund"
        ersattning:
          type: array
          items:
            $ref: "#/components/schemas/Ersattning"

    PatchRequest:
      type: array
      items:
        type: object
        properties:
          ersattningId:
            type: string
            format: uuid
          avslagsanledning:
            type: string
          beslutsutfall:
            $ref: "#/components/schemas/Beslutsutfall"

    Kund:
      type: object
      properties:
        efternamn:
          type: string
        fornamn:
          type: string
        kon:
          type: string
          enum: [MAN, KVINNA]
        anstallning:
          $ref: "#/components/schemas/Anstallning"

    Anstallning:
      type: object
      properties:
        organisationsnummer:
          type: string
        organisationsnamn:
          type: string
        arbetstid_procent:
          type: integer
        anstallningsdag:
          type: string
          format: date
        sista_anstallningsdag:
          type: string
          format: date

    Ersattning:
      type: object
      properties:
        ersattning_id:
          type: string
          format: uuid
        ersattningstyp:
          type: string
        omfattning_procent:
          type: integer
        belopp:
          type: integer
        berakningsgrund:
          type: integer
        beslutsutfall:
          $ref: "#/components/schemas/Beslutsutfall"
        avslagsanledning:
          type: string
          nullable: true
        from:
          type: string
          format: date
        tom:
          type: string
          format: date

    Beslutsutfall:
      type: string
      enum: [JA, NEJ, FU]
